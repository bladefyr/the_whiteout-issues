name: "🪲 Bug Report"
description: Report a bug or crash in Pagophobia (Forge 1.20.1)
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out this form as accurately as possible.

  - type: dropdown
    id: environment
    attributes:
      label: Game Environment
      description: Pagophobia is built exclusively for this setup. Please confirm your environment.
      options:
        - "Minecraft 1.20.1 — Forge"
    validations:
      required: true

  - type: input
    id: mod-version
    attributes:
      label: Pagophobia Mod Version
      placeholder: "e.g., 1.0.2, beta-3"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the Bug
      placeholder: Provide a clear and concise description of what happened.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Do '...'
        4. See error
    validations:
      required: true

  - type: input
    id: logs
    attributes:
      label: Crash Report / Latest Log Link
      description: "If your game crashed or froze, upload your log folder files to https://mclo.gs or https://pastebin.com and paste the link here."
      placeholder: "https://mclo.gs..."
    validations:
      required: false
